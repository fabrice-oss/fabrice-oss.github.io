<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avrila — Site en construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Source Sans 3',sans-serif;
    background:#F0F4FA;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    text-align:center;
  }
  .aurora{
    position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
  }
  .blob{
    position:absolute;border-radius:50%;filter:blur(90px);
  }
  .b1{width:60%;height:55%;top:-15%;left:-10%;background:rgba(81,108,162,.15);}
  .b2{width:50%;height:45%;top:-10%;right:-8%;background:rgba(201,146,10,.08);}
  .b3{width:45%;height:40%;bottom:-12%;left:25%;background:rgba(26,138,116,.08);}
  .container{
    position:relative;z-index:1;
    padding:48px 32px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:20px;
    box-shadow:0 8px 40px rgba(81,108,162,.1);
    max-width:520px;width:90%;
  }
  .logo{font-size:28px;font-weight:700;color:#516CA2;margin-bottom:28px;letter-spacing:-.01em;}
  .icon{
    width:64px;height:64px;border-radius:16px;
    background:rgba(81,108,162,.08);border:1px solid rgba(81,108,162,.15);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;
  }
  h1{font-size:24px;font-weight:300;color:#1a2035;margin-bottom:12px;letter-spacing:-.01em;}
  p{font-size:16px;font-weight:300;color:#667788;line-height:1.75;margin-bottom:32px;}
  .divider{width:40px;height:2px;background:linear-gradient(90deg,#516CA2,#C9920A);border-radius:2px;margin:0 auto 28px;}
  .contact{
    display:flex;flex-direction:column;gap:10px;
  }
  .contact a{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 22px;border-radius:6px;
    font-size:14px;font-weight:500;
    text-decoration:none;
    transition:all .2s;
  }
  .email{background:#516CA2;color:#fff;}
  .email:hover{background:#3D5A8F;transform:translateY(-2px);}
  .wa{background:rgba(37,211,102,.15);color:#1a6b3a;border:1px solid rgba(37,211,102,.3);}
  .wa:hover{background:rgba(37,211,102,.25);transform:translateY(-2px);}
  .foot{margin-top:28px;font-size:12px;font-weight:300;color:#AABBCC;}
</style>
</head>
<body>
<div class="aurora">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>
<div class="container">
  <div class="logo">Avrila</div>
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="#516CA2" stroke-width="1.5"/>
      <path d="M12 7v5l3 3" stroke="#516CA2" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Site en cours de construction</h1>
  <div class="divider"></div>
  <p>Je travaille à vous offrir une expérience en ligne de qualité.<br>Le site sera disponible très prochainement.</p>
  <div class="contact">
    <a href="mailto:contact@avrila.fr" class="email">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="11" rx="2" stroke="white" stroke-width="1.5"/><path d="M3 7l7 5 7-5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      fabrice@avrila.fr
    </a>
    <a href="https://wa.me/33744827524" class="wa">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 01-13.3 7.9L3 21l1.1-4.7A9 9 0 1121 12z" stroke="#25D366" stroke-width="1.5" stroke-linejoin="round"/></svg>
      WhatsApp
    </a>
  </div>
  <div class="foot">© 2026 — Fabrice Avrila</div>
</div>
</body>
</html>
